<body>
  <header class="subpage-header">

      <span class="wordmark__text" aria-hidden="true">just<b>the</b>constitution<span class="dot">.org</span></span>

    <button class="icon-btn" id="mode-toggle" aria-label="<!-- S:btn.mode_aria -->" title="<!-- S:btn.mode_title -->">

  <main class="info-page">

      <p><!-- S:info.mission_p1 --></p>
      <p><!-- S:info.mission_p2 --></p>

    <!-- ===== FAQ ===== -->
    <section class="info-section" id="faq">
      <h2><!-- S:info.faq_heading --></h2>

      <details class="faq-item">
        <summary><!-- S:info.faq_q1 --></summary>
        <p><!-- S:info.faq_a1 --></p>
      </details>

      <details class="faq-item">
        <summary><!-- S:info.faq_q2 --></summary>
        <p><!-- S:info.faq_a2 --></p>
      </details>

      <details class="faq-item">
        <summary><!-- S:info.faq_q3 --></summary>
        <p><!-- S:info.faq_a3 --></p>

      <details class="faq-item">
        <summary><!-- S:info.faq_q6 --></summary>
        <p><!-- S:info.faq_a6 --></p>

    <!-- ===== Privacy ===== -->
    <section class="info-section" id="privacy">
      <h2><!-- S:info.privacy_heading --></h2>
      <p><!-- S:info.privacy_no_cookies --></p>
      <p><!-- S:info.privacy_analytics --></p>
      <p><!-- S:info.privacy_localstorage --></p>
      <p><!-- S:info.privacy_contact --></p>
    </section>

    <!-- ===== Contact ===== -->
    <section class="info-section" id="contact">
      <h2><!-- S:info.contact_heading --></h2>
      <p><!-- S:info.contact_intro --></p>

      <form class="contact-form" id="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY" />
        <input type="hidden" name="subject" value="JTC Feedback" />
        <input type="hidden" name="from_name" value="JTC Contact Form" />
        <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" autocomplete="off" />

        <label class="form-field">
          <span><!-- S:info.contact_email_label --></span>
          <input type="email" name="email" required autocomplete="email" />
        </label>

        <label class="form-field">
          <span><!-- S:info.contact_msg_label --></span>
          <textarea name="message" required rows="5"></textarea>
        </label>

        <button type="submit" class="contact-form__btn"><!-- S:info.contact_submit --></button>
      </form>

      <div class="contact-form__status" id="form-status" hidden data-success="<!-- S:info.contact_success -->" data-error="<!-- S:info.contact_error -->"></div>

      <p class="contact-form__alt"><!-- S:info.contact_alt --></p>
    </section>
  </main>

  <footer class="site-footer">
    <p><!-- S:footer.tagline --></p>
    <p><a href="https://www.kiyviz.com" target="_blank" rel="noopener"><!-- S:footer.byline --></a></p>
