<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph share card — 1200×630, parchment palette.

  Source file. Export to /og-image.png at repo root before deploying.
  The meta tag at https://justtheconstitution.org/og-image.png is what
  Twitter / FB / LinkedIn / Slack scrapers fetch — they render the PNG,
  not this SVG.

  Composition:
    Left:   engrossed "We" mark, 384×384, paths from assets/favicon-we.svg
    Right:  wordmark + rule + tagline, ranged left at x=560

  Typography:
    Libre Caslon Text for the wordmark and tagline.
    Falls back to system Caslon / Garamond / Georgia for export environments
    that don't have Libre Caslon installed.

  Palette tracks [data-theme="parchment"] light tokens from styles.css:
    paper #f0e6d0   ink #2a1c0a

  Export options (any one — all produce identical PNGs):
    1. Inkscape:  inkscape assets/og-image.svg --export-type=png --export-filename=og-image.png -w 1200
    2. rsvg-convert (librsvg):  rsvg-convert -w 1200 assets/og-image.svg -o og-image.png
    3. Figma / Affinity Designer / Illustrator: open, export as PNG @1×, 1200×630.

  If your export environment lacks Libre Caslon Text, install it (free, SIL OFL,
  fonts.google.com/specimen/Libre+Caslon+Text) OR convert text to paths before
  exporting (in Inkscape: select all text, Path → Object to Path).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="justtheconstitution.org — No ads. No commentary. Just the info.">

  <!-- Parchment background -->
  <rect width="1200" height="630" fill="#f0e6d0"/>

