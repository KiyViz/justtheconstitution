  <!-- Wordmark + tagline, ranged left at x=560 -->
  <g fill="#2a1c0a" font-family="'Libre Caslon Text', 'Caslon Pro', 'Adobe Caslon Pro', Garamond, Georgia, serif">

    <!-- Wordmark: just (regular) the (bold) constitution (regular) .org (smaller) -->
